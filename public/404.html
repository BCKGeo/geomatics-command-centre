<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>BCKGeo</title>
  <script>
    // GitHub Pages SPA redirect: preserves the path so React Router can handle it
    var path = window.location.pathname;
    var search = window.location.search;
    var hash = window.location.hash;
    window.location.replace(
      window.location.origin + '/geomatics-command-centre/?p=' +
      encodeURIComponent(path.replace('/geomatics-command-centre', '') + search + hash)
    );
  </script>
</head>
<body></body>
</html>
