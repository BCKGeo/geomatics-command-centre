# Triggers a Cloudflare Pages rebuild once a day so the bundled
# public/tles.json (generated by scripts/fetch-tles.mjs in prebuild)
# is refreshed with current TLE data from celestrak.org.
#
# Setup: in Cloudflare Pages → geomatics-command-centre → Settings → Builds,
# create a deploy hook. Store the URL as a repo secret named CF_PAGES_DEPLOY_HOOK.
# If the secret is missing the workflow no-ops with a warning so it doesn't fail noisily.

name: Refresh TLEs

on:
  schedule:
    - cron: "17 7 * * *" # Daily at 07:17 UTC
  workflow_dispatch: {}

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CF Pages deploy hook
        env:
          HOOK: ${{ secrets.CF_PAGES_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::CF_PAGES_DEPLOY_HOOK not set; skipping"
            exit 0
          fi
          curl --retry 3 --retry-all-errors -fsS -X POST "$HOOK"
